apiVersion: v1
kind: Service
metadata:
  name: telegram-bot-service
  namespace: telegram-bot
  labels:
    app: second-brain-bot
spec:
  type: ClusterIP  # Use LoadBalancer or NodePort if direct external access needed
  selector:
    app: second-brain-bot
  ports:
  - name: webhook
    protocol: TCP
    port: 8443
    targetPort: 8443
  sessionAffinity: ClientIP  # Important for webhook consistency
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800  # 3 hours

